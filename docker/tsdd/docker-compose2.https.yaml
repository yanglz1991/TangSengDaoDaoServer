services:
  wukongim:
    # 悟空IM
    image: registry.cn-shanghai.aliyuncs.com/wukongim/wukongim:v2
    container_name: ${CONTAINER_NAME}-tsdd-wkim
    restart: always
    ports:
      - "5100:5100" # tcp长连接端口（App 客户端使用，非浏览器，不走 TLS）
      - "5300:5300" # 监控端口
    expose:
      - "5200" # websocket 端口，仅给 nginx 容器内部反代为 wss
    volumes:
      - ./wukongim:/root/wukongim
    env_file:
      - .env
    environment:
      - WK_EXTERNAL_IP=${EXTERNAL_IP}
      # /route 接口下发给 web 端的 wss 地址走 nginx 反代
      - WK_EXTERNAL_WSSADDR=${WK_EXTERNAL_WSSADDR}
  tangsengdaodaoserver:
    image: crpi-10spfkgd32nbn5ev.cn-shanghai.personal.cr.aliyuncs.com/qxim/server:latest
    container_name: ${CONTAINER_NAME}-tsdd-serve
    restart: always
    # command: "api"
    healthcheck:
      test: "wget -q -Y off -O /dev/null http://localhost:8090/v1/ping > /dev/null 2>&1"
      interval: 10s
      timeout: 10s
      retries: 3
    depends_on:
      - redis
      - mysql
      - wukongim
    expose:
      - "8090" # 仅给 nginx 内部访问，外网通过 https://域名/api/ 反代
    volumes:
      - ./tsdd/logs:/home/logs
    env_file:
      - .env
    environment:
      - TS_DB_MYSQLADDR=root:${MYSQL_ROOT_PASSWORD}@tcp(mysql)/${MYSQL_DATABASE}?charset=utf8mb4&parseTime=true&loc=Local
      - TS_EXTERNAL_IP=${EXTERNAL_IP}
      - TS_FILESERVICE=${TS_FILESERVICE}
      - TS_MINIO_ACCESSKEYID=${MINIO_ROOT_USER}
      - TS_MINIO_SECRETACCESSKEY=${MINIO_ROOT_PASSWORD}
  tangsengdaodaoweb:
    image: crpi-10spfkgd32nbn5ev.cn-shanghai.personal.cr.aliyuncs.com/qxim/web:latest
    container_name: ${CONTAINER_NAME}-tsdd-web
    restart: always
    environment:
      # 浏览器从 https://域名 打开 web，API_URL 必须是 https，否则 Mixed Content 被拦截
      - API_URL=${HTTPS_BASE_URL}/api/
    expose:
      - "80"
  tangsengdaodaomanager:
    image: crpi-10spfkgd32nbn5ev.cn-shanghai.personal.cr.aliyuncs.com/qxim/manager:latest
    container_name: ${CONTAINER_NAME}-tsdd-manager
    restart: always
    environment:
      - API_URL=${HTTPS_BASE_URL}/api/
    expose:
      - "80"
  nginx:
    # 反向代理 + HTTPS 终止
    image: nginx:1.27-alpine
    container_name: ${CONTAINER_NAME}-tsdd-nginx
    restart: always
    depends_on:
      - tangsengdaodaoweb
      - tangsengdaodaomanager
      - tangsengdaodaoserver
      - wukongim
    ports:
      - "80:80"     # http -> 301 跳转到 https
      - "443:443"   # web + api + 悟空IM wss
      - "8443:8443" # manager 管理后台（独立端口）
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/logs:/var/log/nginx
  minio:
    # minio文件管理服务
    image: minio/minio:RELEASE.2024-04-06T05-26-02Z # use a remote image
    container_name: ${CONTAINER_NAME}-tsdd-minio
    expose:
      - "9000"
      - "9001"
    command: "server /data --console-address ':9001'"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - ./miniodata:/data
  mysql:
    # mysql数据库
    image: mysql:8.0.33
    container_name: ${CONTAINER_NAME}-tsdd-mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    ports:
      - 3306:3306
    volumes:
      - ./mysqldata:/var/lib/mysql
  redis:
    # redis
    image: redis:7.2.3
    container_name: ${CONTAINER_NAME}-tsdd-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30
  adminer:
    # mysql web管理工具 调试用，为了安全生产不要打开
    image: adminer:4.8.1
    container_name: ${CONTAINER_NAME}-tsdd-adminer
    ports:
      - 8306:8080