# ============ 80 端口 → 强制跳转到 443 ============
server {
    listen 80;
    listen [::]:80;
    server_name qx.qhfhasina.com;
    return 301 https://$host$request_uri;
}

# ============ 443：web + api + 悟空IM wss ============
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name qx.qhfhasina.com;

    ssl_certificate     /etc/nginx/certs/qx_qhfhasina_com.crt;
    ssl_certificate_key /etc/nginx/certs/qx_qhfhasina_com.key;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;

    # ---- API：/api/xxx -> tangsengdaodaoserver:8090/xxx (剥掉 /api 前缀) ----
    # 前端的 API_URL 配置成 https://qx.qhfhasina.com/api/
    location /api/ {
        proxy_pass         http://tangsengdaodaoserver:8090/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ---- 悟空IM WebSocket：wss://qx.qhfhasina.com/wk -> wukongim:5200 ----
    # 通过 wk.yaml 中 external.wssAddr 把这个 URL 下发给客户端
    location /wk {
        proxy_pass         http://wukongim:5200/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---- 根路径：web 前端 ----
    location / {
        proxy_pass         http://tangsengdaodaoweb:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ============ 9443：MinIO HTTPS 反代（让文件下载走 https + 流式转发） ============
# 下载 URL 例：https://qx.qhfhasina.com:9443/common/1777384919746/app-release.apk
server {
    listen 9443 ssl;
    listen [::]:9443 ssl;
    http2 on;
    server_name qx.qhfhasina.com;

    ssl_certificate     /etc/nginx/certs/qx_qhfhasina_com.crt;
    ssl_certificate_key /etc/nginx/certs/qx_qhfhasina_com.key;

    # 允许大文件上传（聊天发文件/视频）
    client_max_body_size 2g;

    location / {
        proxy_pass         http://minio:9000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 大文件下载流式转发，不缓冲（关键！）
        proxy_buffering          off;
        proxy_request_buffering  off;
        proxy_max_temp_file_size 0;
        gzip off;

        # 断点续传支持
        proxy_set_header   Range     $http_range;
        proxy_set_header   If-Range  $http_if_range;

        proxy_connect_timeout 30s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
    }
}

# ============ 8443：manager 后台（独立端口，避免改前端镜像） ============
# 访问 https://qx.qhfhasina.com:8443/
server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    http2 on;
    server_name qx.qhfhasina.com;

    ssl_certificate     /etc/nginx/certs/qx_qhfhasina_com.crt;
    ssl_certificate_key /etc/nginx/certs/qx_qhfhasina_com.key;

    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        proxy_pass         http://tangsengdaodaomanager:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
